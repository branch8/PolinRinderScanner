<head>

  <style>
    :root {
      --bg: #0b1020;
      --panel: #111a33;
      --panel-2: #162345;
      --text: #e6ecff;
      --muted: #9cb0e6;
      --ok: #14b86a;
      --bad: #ef4444;
      --border: #263a73;
      --accent: #5aa0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% -10%, #1d2e61 0%, var(--bg) 55%);
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 1.8rem; }
    .sub { color: var(--muted); margin-bottom: 20px; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
    .card .label { color: var(--muted); font-size: 0.85rem; }
    .card .value { font-size: 1.35rem; font-weight: 700; margin-top: 6px; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    input, button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
    }
    input { min-width: 280px; flex: 1; }
    button { cursor: pointer; }
    button.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(90, 160, 255, 0.2); }
    .table-wrap { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--panel); }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 0.86rem;
      color: var(--muted);
      background: var(--panel-2);
      padding: 10px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }
    tbody td {
      padding: 10px;
      border-bottom: 1px solid rgba(156, 176, 230, 0.15);
      vertical-align: top;
      font-size: 0.93rem;
    }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .badge.bad { background: rgba(239, 68, 68, 0.2); color: #ffc2c2; }
    .badge.prod { background: rgba(239, 68, 68, 0.2); color: #ff3c2e; min-width: 170px}
    .badge.ok { background: rgba(20, 184, 106, 0.2); color: #b8ffe0; }
    details {
      background: rgba(17, 26, 51, 0.45);
      border: 1px solid rgba(156, 176, 230, 0.2);
      border-radius: 8px;
      padding: 6px 8px;
      margin: 4px 0;
    }
    summary { cursor: pointer; color: #bdd0ff; }
    code {
      background: rgba(8, 14, 32, 0.7);
      border: 1px solid rgba(156, 176, 230, 0.25);
      border-radius: 5px;
      padding: 1px 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.85rem;
    }
  </style>
</head>

    const state = { data: EMBEDDED_DATA, mode: 'all', q: '' };
    const el = {
      rows: document.getElementById('rows'),
      summary: document.getElementById('summary'),
      search: document.getElementById('search'),
      filterAll: document.getElementById('filterAll'),
      filterInfected: document.getElementById('filterInfected'),
      filterProductionInfected: document.getElementById('filterProductionInfected')
    };

    function escapeHtml(s) {
      return String(s)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function card(label, value, color = '') {
      const style = color ? ` style="color:${color}"` : '';
      return `<div class="card"><div class="label">${label}</div><div class="value"${style}>${value}</div></div>`;
    }

    function summarize(data) {
      const total = data.length;
      const infected = data.filter(x => !!x.infected).length;
      const clean = total - infected;
      const totalFiles = data.reduce((n, item) => n + Object.keys(item.infected_files || {}).length, 0);
      const totalBranches = data.reduce((n, item) => n + Object.keys(item.infected_branches || {}).length, 0);
      el.summary.innerHTML = [
        card('Total Repositories', total),
        card('Infected', infected, '#ffb3b3'),
        card('Clean', clean, '#b8ffe0'),
        // card('Infected Files', totalFiles, '#ffd699'),
        // card('Affected Branches', totalBranches, '#c8d7ff')
      ].join('');
    }

    function matches(item, q) {
      if (!q) return true;
      const text = [item.repository, JSON.stringify(item.infected_files || {}), JSON.stringify(item.infected_branches || {})].join(' ').toLowerCase();
      return text.includes(q);
    }

    function render() {
      const productionBranchNames = new Set(['production', 'main', 'master', 'release']);
      const q = state.q.trim().toLowerCase();
      const rows = state.data
        .filter(item => {
          const branches = item.infected_branches || {};
          const isProductionInfected = item.infected && Object.keys(branches)
            .some(branch => productionBranchNames.has(String(branch).toLowerCase()));
          if (state.mode === 'infected') return item.infected;
          if (state.mode === 'production_infected') return isProductionInfected;
          return true;
        })
        .filter(item => matches(item, q))
        .sort((a, b) => {
          if (a.infected !== b.infected) return a.infected ? -1 : 1;
          return String(a.repository).localeCompare(String(b.repository));
        });

      el.rows.innerHTML = rows.map(item => {
        const files = item.infected_files || {};
        const branches = item.infected_branches || {};
        const fileCount = Object.keys(files).length;
        const branchCount = Object.keys(branches).length;
        const isProductionInfected = item.infected && Object.keys(branches)
          .some(branch => productionBranchNames.has(String(branch).toLowerCase()));
        const statusLabel = isProductionInfected
          ? '<span class="badge prod">PRODUCTION INFECTED</span>'
          : (item.infected ? '<span class="badge bad">INFECTED</span>' : '<span class="badge ok">CLEAN</span>');

        const fileEntries = Object.entries(files)
          .map(([file, sig]) => `<li><code>${escapeHtml(file)}</code><br><small>${escapeHtml(sig)}</small></li>`)
          .join('');

        const branchEntries = Object.entries(branches)
          .map(([branch, branchFiles]) => {
            const inner = Object.entries(branchFiles || {})
              .map(([file, sig]) => `<li><code>${escapeHtml(file)}</code><br><small>${escapeHtml(sig)}</small></li>`)
              .join('');
            return `<details><summary>${escapeHtml(branch)} (${Object.keys(branchFiles || {}).length} files)</summary><ul>${inner || '<li>No files listed</li>'}</ul></details>`;
          }).join('');

        return `
          <tr>
            <td><code>${escapeHtml(item.repository || '')}</code></td>
            <td>${statusLabel}</td>
            <td>${fileCount}</td>
            <td>${branchCount}</td>
            <td>
              ${fileCount ? `<details><summary>Infected files</summary><ul>${fileEntries}</ul></details>` : '<span style="color:#9cb0e6">-</span>'}
              ${branchCount ? `<details><summary>Branch details</summary>${branchEntries}</details>` : ''}
            </td>
          </tr>
        `;
      }).join('');
    }

    function setMode(mode) {
      state.mode = mode;
      el.filterAll.classList.toggle('active', mode === 'all');
      el.filterInfected.classList.toggle('active', mode === 'infected');
      el.filterProductionInfected.classList.toggle('active', mode === 'production_infected');
      render();
    }

    el.search.addEventListener('input', (e) => { state.q = e.target.value; render(); });
    el.filterAll.addEventListener('click', () => setMode('all'));
    el.filterInfected.addEventListener('click', () => setMode('infected'));
    el.filterProductionInfected.addEventListener('click', () => setMode('production_infected'));

    summarize(state.data);
    render();
  </script>
</body>
</html>
