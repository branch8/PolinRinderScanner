**macOS first run:** right-click → Open → Open (bypasses Gatekeeper)" \
            polinrider-quickstart-mac.command \
            polinrider-quickstart-windows.bat
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
